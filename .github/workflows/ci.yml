name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Install wrench-inspect
        # No continue-on-error: a silent install failure would skip the
        # integration test below and leave the wrench gate decorative.
        run: cargo install --git https://github.com/constantin-jais/wrench-inspect.git --rev 973bd76a22c84003ec4f5c3a4379f9c93fe35278
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Wrench integration test
        # The test is #[ignore]d so local runs without wrench-inspect stay
        # green; CI installs the binary above, so it must actually run here.
        run: cargo test -p rumble-canvas-handoff --test wrench_integration_test -- --ignored
